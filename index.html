<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f6faff 0%, #ffffff 100%);
      color: #10213c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid #dce7f3;
    }

    header .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0a3b7a;
      letter-spacing: -0.5px;
    }

    nav a {
      color: #385a86;
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #0a3b7a;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #e5efff;
      color: #0f4ab6;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.95rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.8px;
      margin-bottom: 1.5rem;
      color: #06183e;
    }

    h1 span {
      background: linear-gradient(90deg, #0064c8, #00a5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-size: 1.15rem;
      color: #4d6580;
      max-width: 540px;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 0.85rem 1.9rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(9, 54, 112, 0.12);
    }

    .btn-primary {
      background: #0057b8;
      color: #ffffff;
    }

    .btn-secondary {
      background: transparent;
      color: #0a3b7a;
      border: 1px solid #c8d9ed;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #6b7a96;
      font-size: 0.85rem;
      border-top: 1px solid #e1ebf5;
      background: #ffffff;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Hello</div>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">À propos</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <span class="badge">Bienvenue</span>
    <h1>Bonjour,<br /><span>commençons ici.</span></h1>
    <p class="subtitle">
      C'est la page d'accueil de votre première application.
      Modifiez ce fichier pour démarrer votre projet.
    </p>
    <div class="actions">
      <a href="#" class="btn btn-primary">Démarrer</a>
      <a href="#" class="btn btn-secondary">En savoir plus</a>
    </div>
  </main>

  <footer>
    &copy; 2026 Hello — Premier projet
  </footer>

</body>
</html>
