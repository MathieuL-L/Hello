<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    header .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: -0.5px;
    }

    nav a {
      color: #94a3b8;
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #f1f5f9;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #38bdf8;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 1.5rem;
    }

    h1 span {
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-size: 1.15rem;
      color: #94a3b8;
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #38bdf8;
      color: #0f172a;
    }

    .btn-secondary {
      background: transparent;
      color: #f1f5f9;
      border: 1px solid #334155;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #475569;
      font-size: 0.85rem;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Hello</div>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">À propos</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <span class="badge">Bienvenue</span>
    <h1>Bonjour,<br /><span>commençons ici.</span></h1>
    <p class="subtitle">
      C'est la page d'accueil de votre première application.
      Modifiez ce fichier pour démarrer votre projet.
    </p>
    <div class="actions">
      <a href="#" class="btn btn-primary">Démarrer</a>
      <a href="#" class="btn btn-secondary">En savoir plus</a>
    </div>
  </main>

  <footer>
    &copy; 2026 Hello — Premier projet
  </footer>

</body>
</html>
